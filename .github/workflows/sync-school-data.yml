name: Sync School Data

on:
  schedule:
    # 每周一凌晨 3 点（北京时间）自动同步
    - cron: "0 19 * * 0"
    # 中招季（6-8月）每天凌晨 3 点
    - cron: "0 19 1-31 6,7,8 *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/score-data.mjs"
      - "scripts/school-list.mjs"
      - "scripts/score-aliases.mjs"
      - "scripts/fetch-scores.mjs"
      - "scripts/scores-fetched.json"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync data (fetch + generate + database)
        run: npm run sync:data

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi
          git add src/data/schools.json src/data/meta.json src/data/data-manifest.json scripts/scores-fetched.json data/zhongzhao.db data/d1-seed.sql
          git commit -m "$(cat <<'EOF'
chore: 自动同步学校分数线数据

由 GitHub Actions 定时抓取，更新 JSON 与 SQLite 数据库。
EOF
)"
          git push
